name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: make release

      - name: Compute SHA256
        id: hash
        run: echo "sha256=$(shasum -a 256 build/aimeter.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: build/aimeter.zip
          generate_release_notes: true
          body: |
            ## Install

            **Homebrew**
            ```bash
            brew tap wangyufeng0615/aimeter
            brew install --cask aimeter
            ```

            **Manual**
            1. Download `aimeter.zip` below
            2. Unzip and drag `aimeter.app` to Applications
            3. First launch: macOS may show "unverified developer" — go to **System Settings → Privacy & Security → Open Anyway**

            SHA256: `${{ steps.hash.outputs.sha256 }}`

      - name: Bump Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap bump"
            exit 0
          fi
          V="${VERSION#v}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/wangyufeng0615/homebrew-aimeter.git" tap
          cd tap
          mkdir -p Casks
          cat > Casks/aimeter.rb <<EOF
          cask "aimeter" do
            version "${V}"
            sha256 "${SHA256}"

            url "https://github.com/wangyufeng0615/aimeter/releases/download/v#{version}/aimeter.zip"
            name "aimeter"
            desc "Menu bar usage monitor for Claude Code and Codex CLI"
            homepage "https://github.com/wangyufeng0615/aimeter"

            depends_on macos: ">= :sonoma"

            app "aimeter.app"

            zap trash: [
              "~/Library/Caches/com.aimeter.app",
              "~/Library/Preferences/com.aimeter.app.plist",
            ]
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/aimeter.rb
          if git diff --cached --quiet; then
            echo "No cask changes"
            exit 0
          fi
          git commit -m "aimeter ${V}"
          git push
