name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      DEVELOPER_ID: ${{ secrets.DEVELOPER_ID_APPLICATION }}
      CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
      CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
      NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_API_KEY_P8 }}
      NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
      NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can commit appcast.xml back to main at the end
          fetch-depth: 0

      - name: Run tests
        run: swift test

      - name: Vendor Sparkle
        run: make vendor-sparkle

      - name: Check signing config
        id: sign
        run: |
          if [ -n "$CERT_P12_BASE64" ] && [ -n "$CERT_PASSWORD" ] \
             && [ -n "$NOTARY_KEY_P8_BASE64" ] && [ -n "$NOTARY_KEY_ID" ] \
             && [ -n "$NOTARY_ISSUER_ID" ] && [ -n "$DEVELOPER_ID" ] \
             && [ -n "$SPARKLE_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Signing secrets missing — shipping ad-hoc build (no appcast update either)"
          fi

      - name: Set up signing keychain
        if: steps.sign.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend temp keychain to user search list so codesign finds the cert
          EXISTING=$(security list-keychains -d user | sed -e 's/^[[:space:]]*//' -e 's/"//g' | tr '\n' ' ')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo -n "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" \
              -t cert -f pkcs12 -k "$KEYCHAIN_PATH" \
              -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
              -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          NOTARY_KEY="$RUNNER_TEMP/notary.p8"
          echo -n "$NOTARY_KEY_P8_BASE64" | base64 --decode > "$NOTARY_KEY"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "NOTARY_KEY=$NOTARY_KEY" >> "$GITHUB_ENV"

      - name: Build, sign, notarize
        if: steps.sign.outputs.enabled == 'true'
        run: make notarize

      - name: Build (ad-hoc fallback)
        if: steps.sign.outputs.enabled != 'true'
        run: make release

      - name: Cleanup keychain & secrets
        if: always() && env.KEYCHAIN_PATH != ''
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$NOTARY_KEY"

      - name: Compute SHA256
        id: hash
        run: echo "sha256=$(shasum -a 256 build/aimeter.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create release (signed)
        if: steps.sign.outputs.enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: build/aimeter.zip
          generate_release_notes: true
          body: |
            ## Install

            **Homebrew**
            ```bash
            brew tap wangyufeng0615/aimeter
            brew install --cask aimeter
            ```

            **Manual**
            1. Download `aimeter.zip` below
            2. Unzip and drag `aimeter.app` to Applications
            3. Double-click to launch — signed and notarized by Apple.

            Existing installations will be auto-updated by Sparkle within 24 h (or open Settings → Updates → Check for Updates…).

            SHA256: `${{ steps.hash.outputs.sha256 }}`

      - name: Create release (unsigned)
        if: steps.sign.outputs.enabled != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: build/aimeter.zip
          generate_release_notes: true
          body: |
            ## Install

            **Homebrew**
            ```bash
            brew tap wangyufeng0615/aimeter
            brew install --cask aimeter
            ```

            **Manual**
            1. Download `aimeter.zip` below
            2. Unzip and drag `aimeter.app` to Applications
            3. First launch: macOS may show "unverified developer" — go to **System Settings → Privacy & Security → Open Anyway**

            SHA256: `${{ steps.hash.outputs.sha256 }}`

      # --- Sparkle appcast publish (only on signed releases) ------------------
      # Done AFTER the GitHub release is created so the zip URL referenced by
      # appcast.xml is guaranteed to resolve.
      - name: Generate appcast.xml
        if: steps.sign.outputs.enabled == 'true'
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          V="${VERSION#v}"
          APPCAST_DIR="$RUNNER_TEMP/sparkle-updates"
          APPCAST_PATH="$APPCAST_DIR/appcast.xml"
          DOWNLOAD_PREFIX="https://github.com/${REPO}/releases/download/v${V}"

          rm -rf "$APPCAST_DIR"
          mkdir -p "$APPCAST_DIR"
          cp build/aimeter.zip "$APPCAST_DIR/aimeter.zip"

          # Seed APPCAST_PATH with the existing appcast on main so
          # generate_appcast merges the new version into the historical list
          # (it reads the -o target if it already exists).
          git fetch origin main
          if git cat-file -e origin/main:docs/appcast.xml 2>/dev/null; then
            git show origin/main:docs/appcast.xml > "$APPCAST_PATH"
          fi

          # SPARKLE_PRIVATE_KEY is guaranteed present here by the sign-check
          # step's guard, so no fallback branch is needed.
          # --maximum-deltas 0: CI only retains the current archive, so skip
          # binary delta generation until historical zips are preserved.
          printf '%s' "$SPARKLE_PRIVATE_KEY" | Vendor/Sparkle/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_PREFIX" \
            --link "https://github.com/${REPO}" \
            --maximum-deltas 0 \
            -o "$APPCAST_PATH" \
            "$APPCAST_DIR"

          cp "$APPCAST_PATH" "$RUNNER_TEMP/appcast.xml"

      - name: Commit appcast.xml to main
        if: steps.sign.outputs.enabled == 'true'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          mkdir -p docs
          cp "$RUNNER_TEMP/appcast.xml" docs/appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          if git diff --cached --quiet; then
            echo "No appcast changes (race? same version re-tagged?)"
            exit 0
          fi
          git commit -m "appcast: ${VERSION}"
          git push origin main

      - name: Bump Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap bump"
            exit 0
          fi
          V="${VERSION#v}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/wangyufeng0615/homebrew-aimeter.git" tap
          cd tap
          mkdir -p Casks
          cat > Casks/aimeter.rb <<EOF
          cask "aimeter" do
            version "${V}"
            sha256 "${SHA256}"

            url "https://github.com/wangyufeng0615/aimeter/releases/download/v#{version}/aimeter.zip"
            name "aimeter"
            desc "Menu bar usage monitor for Claude Code and Codex CLI"
            homepage "https://github.com/wangyufeng0615/aimeter"

            depends_on macos: ">= :sonoma"

            app "aimeter.app"

            zap trash: [
              "~/Library/Caches/com.aimeter.app",
              "~/Library/Preferences/com.aimeter.app.plist",
            ]
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/aimeter.rb
          if git diff --cached --quiet; then
            echo "No cask changes"
            exit 0
          fi
          git commit -m "aimeter ${V}"
          git push
